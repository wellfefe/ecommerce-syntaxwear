<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tenis e Sneakers Online</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <header class="header">
        <h1 class="logo" aria-label="Logo da SyntaxWear">
            <a href="/" title="SyntaxWear - Tenis e Sneakers Online">
                <img src="./images/logo/Logo.svg" alt="SyntaxWear - Tenis e Sneakers Online">
            </a>
        </h1>

        <nav class="navigation-center" aria-label="Navegacao principal">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlets</a></li>
            </ul>
        </nav>

        <nav class="navigation-actions" aria-label="Menu de acoes">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li>
                    <a href="#" aria-label="Minha conta">
                        <img src="./images/icons/user.svg" alt="Minha conta">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Ajuda">
                        <img src="./images/icons/help.svg" alt="Ajuda">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Sacola de compras">
                        <img src="./images/icons/bag.svg" alt="Sacola de compras">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Ecommerce de Tenis</h1>
        </section>

        <section id="categorias" class="categories" aria-labelledby="categories-title">
            <h2 id="categories-title">Categorias de Tenis</h2>
        </section>

        <section id="produtos" class="featured-products" aria-labelledby="featured-products-title">
            <h2 id="featured-products-title">Produtos em Destaque</h2>
        </section>
    </main>

    <footer id="contato" class="footer">
        <section class="contact-info" aria-labelledby="contact-title">
            <h2 id="contact-title">Contato</h2>
        </section>

        <nav class="footer-links" aria-label="Links do rodape">
            <ul>
                <li><a href="#hero">Masculino</a></li>
                <li><a href="#categorias">Categorias</a></li>
                <li><a href="#produtos">Produtos</a></li>
            </ul>
        </nav>
    </footer>
</body>

</html>
